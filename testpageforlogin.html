<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwWn7PUguSKvq58cysxYNJPxZXMUcRee03-zjdCBcW0unLMEkuMnK-I5tfTcXLr8N7bsA/exec";

function loginUser() {
  const email = document.getElementById("email").value.trim();
  const msg = document.getElementById("msg");

  msg.innerText = "";

  if (!email) {
    msg.innerText = "❌ Please enter your email";
    return;
  }

fetch(API_URL + "?email=" + encodeURIComponent(email))
    .then(res => res.json())
    .then(data => {

      if (data.status === "not_found") {
        msg.innerText = "❌ No application found";
        return;
      }

      if (data.payment !== "Paid") {
        msg.innerText = "⚠️ Please complete payment first";
        return;
      }

      // ✅ Save user data
      localStorage.setItem("user", JSON.stringify(data));

      // 🚀 Redirect
      window.location.href = "dashboard.html";

    })
    .catch(err => {
      msg.innerText = "⚠️ Server error, try again later";
      console.error(err);
    });
}
