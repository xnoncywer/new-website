<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Cyber Rakshak</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Outfit',sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#050816;
      overflow:hidden;
      color:#fff;
    }

    /* Cyber grid background */
    body::before{
      content:"";
      position:fixed;
      inset:0;
      background-image:
        linear-gradient(rgba(0,230,255,0.02) 1px,transparent 1px),
        linear-gradient(90deg,rgba(0,230,255,0.02) 1px,transparent 1px);
      background-size:40px 40px;
      z-index:0;
    }

    /* Animated glow orbs */
    .orb{
      position:fixed;
      border-radius:50%;
      filter:blur(80px);
      pointer-events:none;
      z-index:0;
    }

    .orb-1{
      width:500px;
      height:500px;
      background:radial-gradient(circle,#00e6ff22,transparent 70%);
      top:-150px;
      left:-150px;
      animation:orbFloat1 7s ease-in-out infinite alternate;
    }

    .orb-2{
      width:450px;
      height:450px;
      background:radial-gradient(circle,#0066ff22,transparent 70%);
      bottom:-150px;
      right:-150px;
      animation:orbFloat2 9s ease-in-out infinite alternate;
    }

    .orb-3{
      width:300px;
      height:300px;
      background:radial-gradient(circle,#00ff9922,transparent 70%);
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      animation:orbFloat3 5s ease-in-out infinite alternate;
    }

    @keyframes orbFloat1{
      from{transform:translateY(0) translateX(0)}
      to{transform:translateY(40px) translateX(30px)}
    }
    @keyframes orbFloat2{
      from{transform:translateY(0) translateX(0)}
      to{transform:translateY(-40px) translateX(-30px)}
    }
    @keyframes orbFloat3{
      from{transform:translate(-50%,-50%) scale(1)}
      to{transform:translate(-50%,-50%) scale(1.2)}
    }

    /* Floating particles */
    .particles{
      position:fixed;
      inset:0;
      z-index:0;
      pointer-events:none;
    }

    .particle{
      position:absolute;
      width:3px;
      height:3px;
      background:#00e6ff;
      border-radius:50%;
      opacity:0;
      animation:particleRise linear infinite;
    }

    @keyframes particleRise{
      0%{opacity:0; transform:translateY(0)}
      10%{opacity:0.6}
      90%{opacity:0.6}
      100%{opacity:0; transform:translateY(-100vh)}
    }

    /* Login Box */
    .login-box{
      position:relative;
      width:440px;
      max-width:92vw;
      padding:48px 44px;
      border-radius:24px;
      background:rgba(8,12,30,0.75);
      border:1px solid rgba(0,230,255,0.15);
      backdrop-filter:blur(25px);
      -webkit-backdrop-filter:blur(25px);
      box-shadow:
        0 0 40px rgba(0,230,255,0.08),
        0 0 80px rgba(0,102,255,0.05),
        inset 0 1px 0 rgba(255,255,255,0.05);
      text-align:center;
      z-index:2;
      animation:boxEntry 0.8s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes boxEntry{
      from{opacity:0; transform:translateY(30px) scale(0.95)}
      to{opacity:1; transform:translateY(0) scale(1)}
    }

    /* Corner accents */
    .login-box::before,
    .login-box::after{
      content:"";
      position:absolute;
      width:40px;
      height:40px;
      border-color:rgba(0,230,255,0.4);
      border-style:solid;
      pointer-events:none;
    }

    .login-box::before{
      top:-1px;
      left:-1px;
      border-width:2px 0 0 2px;
      border-radius:24px 0 0 0;
    }

    .login-box::after{
      bottom:-1px;
      right:-1px;
      border-width:0 2px 2px 0;
      border-radius:0 0 24px 0;
    }

    /* Shield icon */
    .shield-icon{
      width:80px;
      height:80px;
      background:linear-gradient(135deg,rgba(0,230,255,0.1),rgba(0,102,255,0.1));
      border:1px solid rgba(0,230,255,0.25);
      border-radius:22px;
      display:flex;
      align-items:center;
      justify-content:center;
      margin:0 auto 24px;
      box-shadow:0 0 30px rgba(0,230,255,0.12);
      animation:shieldPulse 3s ease-in-out infinite;
    }

    .shield-icon svg{
      width:40px;
      height:40px;
    }

    @keyframes shieldPulse{
      0%,100%{box-shadow:0 0 30px rgba(0,230,255,0.12)}
      50%{box-shadow:0 0 45px rgba(0,230,255,0.2)}
    }

    /* Title */
    h2{
      margin-bottom:8px;
      color:#00e6ff;
      text-shadow:0 0 20px rgba(0,230,255,0.4);
      font-weight:800;
      font-size:26px;
      letter-spacing:0.5px;
    }

    .subtitle{
      font-size:15px;
      color:rgba(255,255,255,0.4);
      margin-bottom:32px;
      font-weight:300;
    }

    /* Input */
    .input-wrapper{
      position:relative;
      margin-bottom:24px;
    }

    .input-icon{
      position:absolute;
      left:16px;
      top:50%;
      transform:translateY(-50%);
      color:rgba(0,230,255,0.5);
      font-size:16px;
      transition:color 0.3s;
      pointer-events:none;
    }

    input{
      width:100%;
      padding:16px 16px 16px 48px;
      border-radius:14px;
      border:1px solid rgba(0,230,255,0.15);
      background:rgba(255,255,255,0.04);
      color:#fff;
      outline:none;
      transition:0.3s;
      font-size:16px;
    }

    input:focus{
      border-color:rgba(0,230,255,0.5);
      box-shadow:0 0 20px rgba(0,230,255,0.1);
      background:rgba(255,255,255,0.06);
    }

    input:focus ~ .input-icon{
      color:#00e6ff;
    }

    input::placeholder{
      color:rgba(255,255,255,0.3);
    }

    /* Buttons */
    .btn-group{
      display:flex;
      flex-direction:column;
      gap:14px;
      margin-top:28px;
    }

    .btn-primary{
      width:100%;
      padding:16px;
      border:none;
      border-radius:14px;
      background:linear-gradient(135deg,#00e6ff,#0066ff);
      color:#000;
      font-weight:700;
      font-size:17px;
      cursor:pointer;
      transition:0.3s;
      position:relative;
      overflow:hidden;
      letter-spacing:0.5px;
    }

    .btn-primary:hover{
      transform:translateY(-2px);
      box-shadow:0 8px 30px rgba(0,230,255,0.3);
    }

    .btn-primary:active{
      transform:translateY(0);
    }

    .btn-primary.loading{
      pointer-events:none;
      opacity:0.7;
    }

    .btn-secondary{
      width:100%;
      padding:14px;
      border:1px solid rgba(0,230,255,0.2);
      border-radius:14px;
      background:rgba(0,230,255,0.05);
      color:#00e6ff;
      font-weight:600;
      font-size:15px;
      cursor:pointer;
      transition:0.3s;
    }

    .btn-secondary:hover{
      background:rgba(0,230,255,0.1);
      border-color:rgba(0,230,255,0.35);
      transform:translateY(-2px);
    }

    /* Shimmer effect on primary button */
    .btn-primary::after{
      content:"";
      position:absolute;
      top:0;
      left:-100%;
      width:60%;
      height:100%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);
      transition:none;
      animation:btnShimmer 3s infinite;
    }

    @keyframes btnShimmer{
      0%{left:-100%}
      100%{left:200%}
    }

    /* Spinner */
    .spinner{
      width:18px;
      height:18px;
      border:2.5px solid rgba(0,0,0,0.3);
      border-top:2.5px solid #000;
      border-radius:50%;
      animation:spin 0.8s linear infinite;
      display:inline-block;
      margin-left:10px;
      vertical-align:middle;
    }

    @keyframes spin{
      0%{transform:rotate(0deg)}
      100%{transform:rotate(360deg)}
    }

    /* Message */
    .msg{
      margin-top:18px;
      font-size:14px;
      min-height:20px;
      font-weight:500;
    }

    .error{
      color:#ff4d4d;
      text-shadow:0 0 10px rgba(255,77,77,0.3);
    }

    .success{
      color:#00ff99;
      text-shadow:0 0 10px rgba(0,255,153,0.3);
    }

    /* Shake */
    .shake{
      animation:shake 0.4s cubic-bezier(.36,.07,.19,.97);
    }

    @keyframes shake{
      0%,100%{transform:translateX(0)}
      10%{transform:translateX(-8px)}
      20%{transform:translateX(8px)}
      30%{transform:translateX(-6px)}
      40%{transform:translateX(6px)}
      50%{transform:translateX(-4px)}
      60%{transform:translateX(4px)}
    }

    /* Scanline effect */
    .login-box .scanline{
      position:absolute;
      top:0;
      left:0;
      right:0;
      height:2px;
      background:linear-gradient(90deg,transparent,rgba(0,230,255,0.15),transparent);
      animation:scanMove 4s linear infinite;
      pointer-events:none;
    }

    @keyframes scanMove{
      0%{top:0}
      100%{top:100%}
    }

    /* Footer text */
    .footer-text{
      margin-top:24px;
      font-size:12px;
      color:rgba(255,255,255,0.2);
      letter-spacing:0.5px;
    }

    /* Responsive */
    @media(max-width:480px){
      .login-box{
        padding:36px 28px;
        border-radius:20px;
      }
      h2{font-size:22px}
      .shield-icon{width:68px;height:68px;border-radius:18px}
      .shield-icon svg{width:34px;height:34px}
      input{padding:14px 14px 14px 44px;font-size:15px}
      .btn-primary{padding:14px;font-size:16px}
      .btn-secondary{padding:12px;font-size:14px}
    }
  </style>
</head>

<body>

<!-- Background effects -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<!-- Floating particles -->
<div class="particles" id="particles"></div>

<!-- Login Box -->
<div class="login-box" id="box">

  <!-- Scanline effect -->
  <div class="scanline"></div>

  <!-- Shield Icon -->
  <div class="shield-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="#00e6ff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      <path d="M9 12l2 2 4-4"/>
    </svg>
  </div>

  <h2>🔐 Cyber Rakshak</h2>
  <p class="subtitle">INTERNSHIP Portal Login</p>

  <div class="input-wrapper">
    <span class="input-icon">✉️</span>
    <input type="email" id="email" placeholder="Enter registered email">
  </div>

  <div class="btn-group">
    <button class="btn-primary" id="btn" onclick="loginUser()">Login</button>
    <button class="btn-secondary" onclick="window.location.href='internship.html'">← Return</button>
  </div>

  <p class="msg" id="msg"></p>

  <p class="footer-text">Cyber Rakshak Trainings & Investigation Center</p>
</div>


<!-- Generate floating particles -->
<script>
(function(){
  var container = document.getElementById('particles');
  for(var i = 0; i < 20; i++){
    var p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.bottom = '-10px';
    p.style.animationDuration = (6 + Math.random() * 8) + 's';
    p.style.animationDelay = (Math.random() * 8) + 's';
    p.style.width = (2 + Math.random() * 3) + 'px';
    p.style.height = p.style.width;
    container.appendChild(p);
  }
})();
</script>

<!-- Login Logic -->
<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwWn7PUguSKvq58cysxYNJPxZXMUcRee03-zjdCBcW0unLMEkuMnK-I5tfTcXLr8N7bsA/exec";

function setLoading(state){
  const btn = document.getElementById("btn");
  if(state){
    btn.classList.add("loading");
    btn.innerHTML = "Logging in <span class='spinner'></span>";
  }else{
    btn.classList.remove("loading");
    btn.innerHTML = "Login";
  }
}

function showMsg(text,type){
  const msg = document.getElementById("msg");
  msg.innerText = text;
  msg.className = "msg " + type;
}

function shakeBox(){
  const box = document.getElementById("box");
  box.classList.add("shake");
  setTimeout(()=>box.classList.remove("shake"),400);
}

function loginUser(){
  const email = document.getElementById("email").value.trim();

  showMsg("","");

  if(!email){
    showMsg("❌ Enter your email first","error");
    shakeBox();
    return;
  }

  setLoading(true);

  fetch(API_URL + "?email=" + encodeURIComponent(email))
    .then(res=>res.json())
    .then(data=>{
      setLoading(false);

      if(data.status === "not_found"){
        showMsg("❌ No application found with this email","error");
        shakeBox();
        return;
      }

      if(data.payment !== "Paid"){
        showMsg("⚠️ Complete payment first","error");
        shakeBox();
        return;
      }

      localStorage.setItem("user", JSON.stringify(data));

      showMsg("✅ Login successful! Redirecting...","success");

      setTimeout(()=>{
        window.location.href = "dashboard.html";
      },800);

    })
    .catch(err=>{
      setLoading(false);
      showMsg("⚠️ Server error. Try again.","error");
      console.error(err);
    });
}

// Enter key to login
document.getElementById("email").addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    e.preventDefault();
    loginUser();
  }
});
</script>

</body>
</html>
