
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Cyber Rakshak</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Outfit',sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#050816;
      overflow:hidden;
      color:#fff;
    }

    /* animated glow background */
    body::before{
      content:"";
      position:absolute;
      width:400px;
      height:400px;
      background:radial-gradient(circle,#00e6ff33,transparent 70%);
      top:-100px;
      left:-100px;
      filter:blur(40px);
      animation:float 6s infinite alternate;
    }

    body::after{
      content:"";
      position:absolute;
      width:400px;
      height:400px;
      background:radial-gradient(circle,#0066ff33,transparent 70%);
      bottom:-100px;
      right:-100px;
      filter:blur(40px);
      animation:float 8s infinite alternate;
    }

    @keyframes float{
      from{transform:translateY(0px);}
      to{transform:translateY(30px);}
    }

    .login-box{
      position:relative;
      width:340px;
      padding:40px;
      border-radius:18px;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(0,255,255,0.25);
      backdrop-filter:blur(15px);
      box-shadow:0 0 25px rgba(0,230,255,0.15);
      text-align:center;
      z-index:2;
      animation:fadeIn 0.8s ease;
    }

    @keyframes fadeIn{
      from{opacity:0; transform:translateY(20px);}
      to{opacity:1; transform:translateY(0);}
    }

    h2{
      margin-bottom:25px;
      color:#00e6ff;
      text-shadow:0 0 12px #00e6ff;
      font-weight:700;
    }

    input{
      width:100%;
      padding:13px;
      margin-bottom:15px;
      border-radius:10px;
      border:1px solid rgba(0,255,255,0.3);
      background:rgba(255,255,255,0.05);
      color:#fff;
      outline:none;
      transition:0.3s;
    }

    input:focus{
      border-color:#00e6ff;
      box-shadow:0 0 10px #00e6ff55;
    }

    input::placeholder{
      color:#aaa;
    }

    button{
      width:100%;
      padding:13px;
      border:none;
      border-radius:10px;
      background:linear-gradient(135deg,#00e6ff,#0066ff);
      color:#000;
      font-weight:700;
      cursor:pointer;
      transition:0.3s;
      position:relative;
      overflow:hidden;
    }

    button:hover{
      transform:translateY(-2px);
      box-shadow:0 0 15px #00e6ff;
    }

    button.loading{
      pointer-events:none;
      opacity:0.7;
    }

    .spinner{
      width:16px;
      height:16px;
      border:2px solid #000;
      border-top:2px solid transparent;
      border-radius:50%;
      animation:spin 1s linear infinite;
      display:inline-block;
      margin-left:8px;
      vertical-align:middle;
    }

    @keyframes spin{
      0%{transform:rotate(0deg)}
      100%{transform:rotate(360deg)}
    }

    .msg{
      margin-top:12px;
      font-size:13px;
      min-height:18px;
    }

    .error{
      color:#ff4d4d;
    }

    .success{
      color:#00ff99;
    }

    /* shake animation */
    .shake{
      animation:shake 0.3s;
    }

    @keyframes shake{
      0%,100%{transform:translateX(0)}
      25%{transform:translateX(-5px)}
      50%{transform:translateX(5px)}
      75%{transform:translateX(-5px)}
    }

  </style>
</head>

<body>

<div class="login-box" id="box">
  <h2>🔐 Cyber Rakshak Login</h2>

  <input type="email" id="email" placeholder="Enter registered email">

  <button id="btn" onclick="loginUser()">Login</button>

  <p class="msg" id="msg"></p>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwWn7PUguSKvq58cysxYNJPxZXMUcRee03-zjdCBcW0unLMEkuMnK-I5tfTcXLr8N7bsA/exec";

function setLoading(state){
  const btn = document.getElementById("btn");
  if(state){
    btn.classList.add("loading");
    btn.innerHTML = "Logging in <span class='spinner'></span>";
  }else{
    btn.classList.remove("loading");
    btn.innerHTML = "Login";
  }
}

function showMsg(text,type){
  const msg = document.getElementById("msg");
  msg.innerText = text;
  msg.className = "msg " + type;
}

function shakeBox(){
  const box = document.getElementById("box");
  box.classList.add("shake");
  setTimeout(()=>box.classList.remove("shake"),300);
}

function loginUser(){
  const email = document.getElementById("email").value.trim();

  showMsg("","");

  if(!email){
    showMsg("❌ Enter email first","error");
    shakeBox();
    return;
  }

  setLoading(true);

  fetch(API_URL + "?email=" + encodeURIComponent(email))
    .then(res=>res.json())
    .then(data=>{
      setLoading(false);

      if(data.status === "not_found"){
        showMsg("❌ No application found","error");
        shakeBox();
        return;
      }

      if(data.payment !== "Paid"){
        showMsg("⚠️ Complete payment first","error");
        shakeBox();
        return;
      }

      localStorage.setItem("user", JSON.stringify(data));

      showMsg("✅ Login successful","success");

      setTimeout(()=>{
        window.location.href = "dashboard.html";
      },800);

    })
    .catch(err=>{
      setLoading(false);
      showMsg("⚠️ Server error","error");
      console.error(err);
    });
}
</script>

</body>
</html>
